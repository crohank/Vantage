services:
  - type: web
    name: vantage-backend
    runtime: node
    plan: free
    buildCommand: pip3 install -r backend/requirements.txt && FASTEMBED_CACHE_PATH=/opt/render/project/src/.fastembed_cache python3 -c "from fastembed import TextEmbedding; list(TextEmbedding('sentence-transformers/all-MiniLM-L6-v2').embed(['warmup']))" && cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FASTEMBED_CACHE_PATH
        value: /opt/render/project/src/.fastembed_cache
      # Set the following in the Render dashboard → Environment tab:
      # MONGODB_URI        → your Atlas connection string
      # GEMINI_API_KEY     → your Gemini API key
      # HUGGINGFACE_API_KEY → your HuggingFace API key
      # FRED_API_KEY       → your FRED API key
      # FRONTEND_URL       → your Vercel URL (add after Vercel deploy)
